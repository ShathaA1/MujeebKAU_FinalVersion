<!-- sharing/confirm.html -->
<div id="mkConfirmHost" class="mk-confirm-host hidden" aria-hidden="true">
  <div class="mk-confirm-backdrop" data-confirm-close></div>

  <div class="mk-confirm" role="dialog" aria-modal="true" aria-labelledby="mkConfirmTitle" aria-describedby="mkConfirmMsg">
    <div class="mk-confirm-head">
      <div class="mk-confirm-title" id="mkConfirmTitle">Confirm</div>
      <button class="mk-confirm-x" aria-label="Close" data-confirm-close>×</button>
    </div>

    <div class="mk-confirm-body">
      <div class="mk-confirm-msg" id="mkConfirmMsg">Are you sure?</div>
    </div>

    <div class="mk-confirm-actions">
      <button class="mk-confirm-btn mk-cancel" data-confirm-cancel>Cancel</button>
<button class="mk-confirm-btn mk-delete" data-confirm-ok>Delete</button>
    </div>
  </div>
</div>
