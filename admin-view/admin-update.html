<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Update Academic Info</title>
  <link rel="stylesheet" href="../css/shared-style.css" />
  <link rel="stylesheet" href="../css/admin-styles.css">
</head>

<body>
  <div class="app-shell" id="authArea">
    <div class="sidebar-overlay hidden" id="sidebarOverlay" onclick="closeSidebar()"></div>
    <div id="sidebarMount"></div>

    <main class="main-content">
      <div class="container">
        <div class="card">

          <div class="card-header">
            <span>Update Academic Information</span>
            <button class="btn btn-outline small-btn" onclick="location.href='admin-updates-history.html'">
              View Upload History
            </button>
          </div>

          
          <!-- File input for uploading the academic document or image. -->
          <div class="form-group">
            <label>Choose Document (PDF / Image)</label>
            <input type="file" id="adminFileInput" onchange="AdminUpdateView.showFileName(this)">
            <small id="fileNamePreview" class="file-preview"></small>
          </div>

          <!-- Selects which backend processing pipeline should handle the uploaded file. -->
          <div class="form-group">
            <label>Document Type</label>
            <select id="documentType">
              <option value="">Select Type</option>
              <option value="Academic Calendar">Academic Calendar</option>
              <option value="Admission Guide">Admission Guide</option>
              <option value="Regulations">Regulations</option>
            </select>
          </div>

          
          <!-- Defines which users should receive or access this uploaded information. -->
          <div class="form-group">
            <label>Target Users</label>
            <select id="adminTargetCategory">
              <option value="">Select Category</option>
              <option value="all">All Users</option>
              <option value="student">Student</option>
              <option value="faculty">Faculty Member</option>
            </select>
          </div>

          <!-- Assigns the document to all colleges or to one specific college. -->
          <div class="form-group">
            <label>College</label>
            <select id="updateCollege">
              <option value="">Select College</option>
              <option value="all">All Colleges</option>
              <option value="Medicine">Medicine</option>
              <option value="Applied Medical Sciences">Applied Medical Sciences</option>
              <option value="Dentistry">Dentistry</option>
              <option value="Pharmacy">Pharmacy</option>
              <option value="Nursing">Nursing</option>
              <option value="Engineering">Engineering</option>
              <option value="Sciences">Sciences</option>
              <option value="Marine Sciences">Marine Sciences</option>
              <option value="Human Sciences and Design">Human Sciences and Design</option>
              <option value="Environmental Sciences">Environmental Sciences</option>
              <option value="Tourism">Tourism</option>
              <option value="Architecture and Planning">Architecture and Planning</option>
              <option value="Computing and Information Technology">Computing and Information Technology</option>
              <option value="Economics and Administration">Economics and Administration</option>
              <option value="Earth Sciences">Earth Sciences</option>
              <option value="Maritime Studies">Maritime Studies</option>
              <option value="Arts and Humanities">Arts and Humanities</option>
              <option value="Law">Law</option>
              <option value="Education">Education</option>
              <option value="Communication and Media">Communication and Media</option>
            </select>
          </div>


          <!-- Starts the upload and processing flow through AdminUpdateController. -->
          <button id="kbButton" class="btn full-btn" onclick="AdminUpdateController.addToKnowledgeBase()">
            Add to Knowledge Base
          </button>

          <div id="kbStatus" class="mt-20 status-text"></div>

          <!-- ===== Progress Bar ===== -->
          <div id="progressContainer" class="progress-container hidden">
            <div id="progressBar" class="progress-bar"></div>
          </div>

          <div id="uploadStatus" class="mt-20 status-text"></div>

        </div>
      </div>
    </main>
  </div>

  <script src="../js/shared-script.js"></script>
  <script src="../js/admin-script.js?v=4"></script>

  <script>
    // Initialize shared admin UI after the page content is loaded.
    document.addEventListener("DOMContentLoaded", async () => {
      await loadSharedToast();
      await loadSharedSidebar("sidebarMount");
      setSidebarRole("admin");
    });
  </script>
</body>

</html>
