<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password - Mujeeb KAU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/public-style.css" />
  <link rel="stylesheet" href="../css/shared-style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand" onclick="goPublic('landing')" title="Go Home">
        <div class="logo-icon">
          <img src="../sharing/logo.png" alt="Logo">
        </div>
        <div class="brand-text">
          <h2>Mujeeb KAU</h2>
          <p>Academic Assistant</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="top-link" onclick="goPublic('login')">Log In</button>
        <button class="top-link primary" onclick="goPublic('signup')">Create Account</button>
      </div>
    </div>
  </header>

  <main class="public-main">
    <div class="container">

      <!-- ── 3-Step Progress Bar ─────────────────────────────── -->
      <div class="flow-steps" aria-label="Password reset progress">
        <div class="flow-step active" id="fs1">
          <div class="step-circle">1</div>
          <span class="step-label">Email</span>
        </div>
        <div class="flow-connector"></div>
        <div class="flow-step" id="fs2">
          <div class="step-circle">2</div>
          <span class="step-label">Code</span>
        </div>
        <div class="flow-connector"></div>
        <div class="flow-step" id="fs3">
          <div class="step-circle">3</div>
          <span class="step-label">New Password</span>
        </div>
      </div>

      <div id="forgotPasswordPage">
        <div class="card auth-card">

          <!-- Step badge -->
          <div class="step-badge">Step 1 of 3</div>

          <!-- Card header -->
          <div class="card-header">Forgot Your Password?</div>
          <p class="auth-subtitle">Enter your KAU email address and we'll send you a reset code.</p>

          <!-- Email field -->
          <div class="form-group">
            <label for="resetEmail">University Email Address</label>
            <input
              type="email"
              id="resetEmail"
              placeholder="example@stu.kau.edu.sa"
              autocomplete="email"
              spellcheck="false"
              autofocus
            />
            <p class="field-hint">
              🎓 Only KAU emails accepted &nbsp;·&nbsp;
              <span class="hint-domain">@stu.kau.edu.sa</span> or
              <span class="hint-domain">@kau.edu.sa</span>
            </p>
            <p class="field-error" id="resetEmailError"></p>
          </div>

          <!-- Submit -->
          <button id="forgotBtn" class="btn btn-success btn-full" onclick="handlePasswordForgot()">
            Send Reset Code →
          </button>

          <div class="text-center mt-20">
            <span class="link" onclick="goPublic('login')">← Back to Log In</span>
          </div>

        </div>
      </div>

    </div>
  </main>

  <script src="../js/shared-script.js"></script>
  <script src="../js/public-script.js"></script>

  <script>
    const _KAU = /^[a-zA-Z0-9._%+\-]+@(stu\.kau\.edu\.sa|kau\.edu\.sa)$/;

    document.addEventListener("DOMContentLoaded", async () => {
      await loadSharedToast();
      const input = document.getElementById("resetEmail");
      const err   = document.getElementById("resetEmailError");

      // Auto-suggest domain
      input.addEventListener("input", () => {
        const v = input.value;
        if (v && !v.includes("@")) {
          const s = v + "@stu.kau.edu.sa";
          err.innerHTML =
            `💡 Press Tab or click to use <button type="button" class="suggest-btn" onclick="
              document.getElementById('resetEmail').value='${s}';
              document.getElementById('resetEmailError').innerHTML='';
              document.getElementById('resetEmail').classList.remove('input-error');
              document.getElementById('resetEmail').classList.add('input-valid');
            ">${s}</button>`;
          err.style.display = "block";
          err.style.color = "#2e7d32";
        } else if (!v) {
          err.style.display = "none";
          input.classList.remove("input-error", "input-valid");
        }
      });

      // Blur validation
      input.addEventListener("blur", () => {
        const v = input.value.trim();
        if (!v) { input.classList.remove("input-error","input-valid"); err.style.display="none"; return; }
        if (!_KAU.test(v)) {
          input.classList.add("input-error"); input.classList.remove("input-valid");
          err.textContent = "⚠ Use your KAU email (@stu.kau.edu.sa or @kau.edu.sa)";
          err.style.color = "#e53935"; err.style.display = "block";
        } else {
          input.classList.remove("input-error"); input.classList.add("input-valid");
          err.style.display = "none";
        }
      });

      input.addEventListener("focus", () => {
        input.classList.remove("input-error","input-valid"); err.style.display="none";
      });
    });
  </script>

</body>
</html>
