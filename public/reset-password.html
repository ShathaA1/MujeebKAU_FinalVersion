<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password - Mujeeb KAU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="../css/public-style.css" />
  <link rel="stylesheet" href="../css/shared-style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar-inner">
      <div class="topbar-brand" onclick="goPublic('landing')" title="Go Home">
        <div class="logo-icon">
          <img src="../sharing/logo.png" alt="Logo">
        </div>
        <div class="brand-text">
          <h2>Mujeeb KAU</h2>
          <p>Academic Assistant</p>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="top-link" onclick="goPublic('login')">Log In</button>
        <button class="top-link primary" onclick="goPublic('signup')">Create Account</button>
      </div>
    </div>
  </header>

  <main class="public-main">
    <div class="container">

      <!-- ── 3-Step Progress Bar ─────────────────────────────── -->
      <div class="flow-steps" aria-label="Password reset progress">
        <div class="flow-step done">
          <div class="step-circle">✓</div>
          <span class="step-label">Email</span>
        </div>
        <div class="flow-connector done"></div>
        <div class="flow-step done">
          <div class="step-circle">✓</div>
          <span class="step-label">Code</span>
        </div>
        <div class="flow-connector done"></div>
        <div class="flow-step active">
          <div class="step-circle">3</div>
          <span class="step-label">New Password</span>
        </div>
      </div>

      <div class="card auth-card">

        <!-- Step badge -->
        <div class="step-badge">Step 3 of 3 · Final Step</div>

        <div class="card-header">Set Your New Password</div>
        <p class="auth-subtitle">Choose a strong password you haven't used before.</p>

        <!-- New password -->
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="newPassword"
              placeholder="Enter new password"
              autocomplete="new-password"
              autofocus
            />
            <button type="button" class="pass-toggle" onclick="togglePassword('newPassword', this)">👁</button>
          </div>
          <!-- Password strength bar -->
          <div class="strength-bar-wrap" id="strengthWrap" style="display:none">
            <div class="strength-bar" id="strengthBar"></div>
          </div>
          <p class="strength-label" id="strengthLabel"></p>
          <p class="field-hint">
            Must be at least 8 characters · include uppercase, lowercase &amp; a number
          </p>
          <p class="field-error" id="newPasswordError"></p>
        </div>

        <!-- Confirm password -->
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="password-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Re-enter password"
              autocomplete="new-password"
            />
            <button type="button" class="pass-toggle" onclick="togglePassword('confirmPassword', this)">👁</button>
          </div>
          <p class="field-error" id="confirmPasswordError"></p>
        </div>

        <button id="resetBtn" class="btn btn-success btn-full" onclick="handleResetPassword()">
          Reset Password →
        </button>

        <div class="text-center mt-20">
          <span class="link" onclick="goPublic('login')">← Back to Log In</span>
        </div>

      </div>
    </div>
  </main>

  <script src="../js/shared-script.js"></script>
  <script src="../js/public-script.js"></script>

  <script>
    const _STRONG  = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
    const _MEDIUM  = /^(?=.*[a-z])(?=.*[A-Z]).{6,}$|^(?=.*\d)(?=.*[a-zA-Z]).{6,}$/;

    document.addEventListener("DOMContentLoaded", async () => {
      await loadSharedToast();

      const passEl  = document.getElementById("newPassword");
      const passErr = document.getElementById("newPasswordError");
      const confEl  = document.getElementById("confirmPassword");
      const confErr = document.getElementById("confirmPasswordError");
      const bar     = document.getElementById("strengthBar");
      const wrap    = document.getElementById("strengthWrap");
      const label   = document.getElementById("strengthLabel");

      // ── Real-time strength meter ──────────────────────────────────────────
      passEl.addEventListener("input", () => {
        const v = passEl.value;
        if (!v) { wrap.style.display = "none"; label.textContent = ""; return; }
        wrap.style.display = "block";
        bar.className = "strength-bar";
        if (_STRONG.test(v)) {
          bar.classList.add("strength-strong");
          label.textContent = "✓ Strong";
          label.style.color = "#2e7d32";
        } else if (_MEDIUM.test(v) || v.length >= 8) {
          bar.classList.add("strength-medium");
          label.textContent = "Medium — add uppercase or a number";
          label.style.color = "#f9a825";
        } else {
          bar.classList.add("strength-weak");
          label.textContent = "Weak — keep going…";
          label.style.color = "#e53935";
        }
      });

      // ── Blur validation — new password ───────────────────────────────────
      passEl.addEventListener("blur", () => {
        const v = passEl.value;
        if (!v) { passEl.classList.remove("input-error","input-valid"); passErr.style.display="none"; return; }
        if (!_STRONG.test(v)) {
          passEl.classList.add("input-error"); passEl.classList.remove("input-valid");
          passErr.textContent = "⚠ Min 8 characters with uppercase, lowercase, and a number";
          passErr.style.display = "block";
        } else {
          passEl.classList.remove("input-error"); passEl.classList.add("input-valid");
          passErr.style.display = "none";
        }
      });
      passEl.addEventListener("focus", () => { passEl.classList.remove("input-error","input-valid"); passErr.style.display="none"; });

      // ── Blur validation — confirm password ───────────────────────────────
      confEl.addEventListener("blur", () => {
        const v  = confEl.value;
        const p  = passEl.value;
        if (!v) { confEl.classList.remove("input-error","input-valid"); confErr.style.display="none"; return; }
        if (v !== p) {
          confEl.classList.add("input-error"); confEl.classList.remove("input-valid");
          confErr.textContent = "⚠ Passwords do not match";
          confErr.style.display = "block";
        } else {
          confEl.classList.remove("input-error"); confEl.classList.add("input-valid");
          confErr.style.display = "none";
        }
      });
      confEl.addEventListener("focus", () => { confEl.classList.remove("input-error","input-valid"); confErr.style.display="none"; });
    });
  </script>

</body>
</html>
