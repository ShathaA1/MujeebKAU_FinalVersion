<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Guest Chat - Mujeeb KAU</title>
  <link rel="stylesheet" href="../css/public-style.css" />
  <link rel="stylesheet" href="../css/UserView-styles.css" />
</head>

<body>

<!-- Public Header -->
<header class="topbar">
  <div class="topbar-inner">

    <div class="topbar-brand"
         onclick="window.location.href='/public/landing.html'">

      <div class="logo-icon">
        <img src="../sharing/logo.png" alt="Logo">
      </div>

      <div class="brand-text">
        <h2>Mujeeb KAU</h2>
        <p>Academic Assistant</p>
      </div>

    </div>

    <div class="topbar-actions">
      <button class="top-link"
              onclick="window.location.href='/public/login.html'">
        Log In
      </button>

      <button class="top-link primary"
              onclick="window.location.href='/public/signup.html'">
        Create Account
      </button>
    </div>

  </div>
</header>

<!-- Chat Section -->
<main class="public-main">

  <div class="container">

      <h2 class="chat-title">Mujeeb KAU</h2>

   <div class="chat-container">

  <div class="chat-messages" id="chatMessages">
    <!-- Hardcoded welcome message — never generated by LLM -->
    <div class="welcome-hero">
      <h1 class="welcome-heading">مرحبًا، أنا مجيب</h1>
      <p class="welcome-subtitle">
        مساعدك الأكاديمي الذكي في جامعة الملك عبدالعزيز.<br>
        اسأل عن القبول، المواعيد الأكاديمية، اللوائح الجامعية، والمزيد.
      </p>
    </div>
  </div>

  <div class="chat-input-bar">
    <input type="text" id="chatInput"
           placeholder="اكتب سؤالك هنا..."
           onkeypress="if(event.key==='Enter') sendMessage()">
    <button class="send-btn" onclick="sendMessage()">إرسال</button>
  </div>

</div>

  </div>

</main>
<script>
  localStorage.setItem("mk_user_type", "guest");
</script>

<!-- marked.js for Markdown parsing -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- shared-script.js MUST be loaded first: it defines API_BASE_URL, request(), getAuthHeaders(), showFeedback() -->
<script src="../js/shared-script.js"></script>
<script src="../js/UserView-script.js"></script>

</body>
</html>
